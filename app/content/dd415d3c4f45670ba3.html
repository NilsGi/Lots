<p>Handenheten Pager är en Alfanumerisk två-vägs personsökare med larmknapp för möjlighet att kalla på hjälp.<br>
Sökaren Pager 2.0  har 5 knappar</p>
<ul>
<li>Enter/välja</li>
<li>Scroll upp</li>
<li>Scroll ner</li>
<li>Akutlarm (röd)</li>
<li>Assistlarm (blå)</li>
</ul>
<p>Batteritid ca 6 veckor (laddningsbara batterier)<br>
Klassad enligt IP 66</p>
