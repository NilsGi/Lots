<h2>ESRep-0A</h2>
<p>EkoSecure  två bands Repeater, som använder 863-870 MHz bandet för kommuniktion på större avstånd. Detta för att täcka in större industribyggnader och yttre områden</p>
<p>Enheten matas med 240 VAC men har inbyggt batteri för säker drift vid nätavbrott. Batteriet håller för drift i ca 70 dygn.</p>
