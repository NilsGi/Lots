<p>Trådlös Radio Display LED 10<br>
1 eller 2- raders vägg &amp; takdisplay med 10 tecken per linje rullande text. Meddelanden skickas via Pocsag radio till displayen. Teckenstorleken på ca 12 cm. Den kan läsas på upp till 60 meter avstånd. Displayen kan fås med reläutgång, se nedan. Enheten matas via 230VAC</p>
